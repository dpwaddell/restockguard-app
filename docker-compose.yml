services:
  app:
    build: .
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-restock}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-restock}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: node_modules/.bin/tsx worker.js
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-restock}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-restock}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restock}
      POSTGRES_USER: ${POSTGRES_USER:-restock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restock}"]
      interval: 5s
      timeout: 5s
      retries: 5

    ports:
      - "5435:5432"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
